root /var/www/suivicloud.xyz/current;
index index.html;

access_log /var/log/nginx/suivicloud.xyz.access.log;
error_log /var/log/nginx/suivicloud.xyz.error.log warn;

add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-Frame-Options "SAMEORIGIN" always;

location = / {
    return 301 https://suivicloud.xyz/fr/;
}

location = /api/contact {
    proxy_pass http://127.0.0.1:4010/api/contact;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 15s;
}

location ~* \.(?:css|js|png|svg|ico|webp|jpg|jpeg)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
}

location / {
    try_files $uri $uri/ =404;
}

error_page 404 /404.html;
